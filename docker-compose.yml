services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bot
      POSTGRES_PASSWORD: bot
      POSTGRES_DB: trading_bot
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bot"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    environment:
      BOT_DATABASE_URL: postgresql+asyncpg://bot:bot@db:5432/trading_bot
      BOT_REDIS_URL: redis://redis:6379/0
      BOT_ENABLE_SCANNER: "1"
      BOT_JWT_SECRET: ${BOT_JWT_SECRET:-change-me-in-production}
      BOT_TELEGRAM_BOT_TOKEN: ${BOT_TELEGRAM_BOT_TOKEN:-}
      BOT_TELEGRAM_CHAT_ID: ${BOT_TELEGRAM_CHAT_ID:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8000:8000"
    volumes:
      - models:/app/models

  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  pgdata:
  models:
